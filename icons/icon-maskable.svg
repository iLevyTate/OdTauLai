<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="OdTauLai">
  <defs>
    <radialGradient id="mbg" cx="38%" cy="32%" r="78%">
      <stop offset="0%" stop-color="#0e1a2e"/>
      <stop offset="55%" stop-color="#0a1320"/>
      <stop offset="100%" stop-color="#060c16"/>
    </radialGradient>
    <linearGradient id="mmark" x1="18%" y1="22%" x2="82%" y2="88%">
      <stop offset="0%" stop-color="#9cc3ff"/>
      <stop offset="45%" stop-color="#6aa8ff"/>
      <stop offset="100%" stop-color="#3d7fd4"/>
    </linearGradient>
    <filter id="mglow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Full-bleed plate (OS applies mask) -->
  <rect width="512" height="512" fill="url(#mbg)"/>
  <!-- Marks at identical scale to icon.svg so the home-screen (maskable)
       and splash / app-drawer (non-maskable) renders show the visible
       mark at the same size and position. The earlier 1.17x scale-from-
       centre made the mark on the home-screen icon ~17% larger than the
       mark on the auto-generated PWA splash; the transition between the
       two read as a small downward jump on launch. The mark already sits
       inside the 80% maskable safe zone (arc r=158, max extent ~414/512). -->
  <path d="M 119.2 177 A 158 158 0 1 1 177 392.8"
        fill="none" stroke="url(#mmark)" stroke-width="22" stroke-linecap="round"/>
  <path d="M 168 268 L 228 328 L 352 184"
        fill="none" stroke="url(#mmark)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" filter="url(#mglow)"/>
</svg>
